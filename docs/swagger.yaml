definitions:
  dto.Address:
    properties:
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_default:
        type: boolean
      label:
        type: string
      phone:
        type: string
      recipient_name:
        type: string
      region:
        type: string
      street:
        type: string
      user_id:
        type: integer
    type: object
  dto.AuthResponse:
    properties:
      hasStore:
        type: boolean
      role:
        type: string
      storeId:
        type: integer
      telegramUserId:
        type: integer
      token:
        type: string
      userId:
        type: integer
      username:
        type: string
    type: object
  dto.CartItem:
    properties:
      product:
        $ref: '#/definitions/dto.Product'
      quantity:
        type: integer
    type: object
  dto.CartResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.CartItem'
        type: array
      total_price:
        type: number
    type: object
  dto.Category:
    properties:
      id:
        type: integer
      name:
        type: string
      store_id:
        type: integer
    type: object
  dto.CheckoutRequest:
    properties:
      address_id:
        type: integer
      store_id:
        type: integer
    required:
    - address_id
    - store_id
    type: object
  dto.CreateAddressRequest:
    properties:
      city:
        type: string
      country:
        type: string
      is_default:
        type: boolean
      label:
        description: 'home, work, other (optional — default: home)'
        type: string
      phone:
        type: string
      recipient_name:
        type: string
      region:
        type: string
      street:
        type: string
    type: object
  dto.CreateCategoryRequest:
    properties:
      name:
        type: string
    type: object
  dto.CreateStoreRequest:
    properties:
      category:
        type: string
      cover_image:
        type: string
      description:
        type: string
      email:
        type: string
      location:
        type: string
      logo_image:
        type: string
      name:
        type: string
      phone:
        type: string
      telegram_chat_id:
        type: integer
    type: object
  dto.Order:
    properties:
      created_at:
        type: string
      customer:
        $ref: '#/definitions/dto.OrderCustomer'
      id:
        type: integer
      order_items:
        items:
          $ref: '#/definitions/dto.OrderItem'
        type: array
      shipping_address:
        $ref: '#/definitions/dto.Address'
      status:
        type: string
      store_id:
        type: integer
      total_price:
        type: number
      user_id:
        type: integer
    type: object
  dto.OrderCustomer:
    properties:
      id:
        type: integer
      username:
        type: string
    type: object
  dto.OrderItem:
    properties:
      id:
        type: integer
      order_id:
        type: integer
      price:
        type: number
      product:
        $ref: '#/definitions/dto.OrderProductDetail'
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  dto.OrderProductDetail:
    properties:
      category:
        type: string
      id:
        type: integer
      images:
        items:
          type: string
        type: array
      name:
        type: string
    type: object
  dto.PaginatedResponse:
    properties:
      data: {}
      total:
        type: integer
    type: object
  dto.Product:
    properties:
      category:
        type: string
      description:
        type: string
      id:
        type: integer
      images:
        items:
          type: string
        type: array
      is_boosted:
        type: boolean
      is_posted:
        type: boolean
      name:
        type: string
      price:
        type: number
      seller_id:
        type: integer
      status:
        type: string
      stock:
        type: integer
      store_id:
        type: integer
    type: object
  dto.Store:
    properties:
      category:
        type: string
      cover_image:
        type: string
      description:
        type: string
      email:
        type: string
      id:
        type: integer
      location:
        type: string
      logo_image:
        type: string
      name:
        type: string
      phone:
        type: string
      seller_id:
        type: integer
      status:
        type: string
      telegram_chat_id:
        type: integer
      telegram_chat_title:
        type: string
    type: object
  dto.UpdateAddressRequest:
    properties:
      city:
        type: string
      country:
        type: string
      is_default:
        type: boolean
      label:
        type: string
      phone:
        type: string
      recipient_name:
        type: string
      region:
        type: string
      street:
        type: string
    type: object
  dto.UpdateStoreRequest:
    properties:
      category:
        type: string
      cover_image:
        type: string
      description:
        type: string
      email:
        type: string
      location:
        type: string
      logo_image:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  errorx.AppError:
    properties:
      details:
        additionalProperties: true
        type: object
      error:
        $ref: '#/definitions/errorx.ErrorCode'
      message:
        type: string
    type: object
  errorx.ErrorCode:
    enum:
    - UNAUTHORIZED
    - FORBIDDEN
    - VALIDATION_ERROR
    - NOT_FOUND
    - INTERNAL_ERROR
    - BAD_REQUEST
    - CONFLICT
    type: string
    x-enum-varnames:
    - ErrUnauthorized
    - ErrForbidden
    - ErrValidation
    - ErrNotFound
    - ErrInternal
    - ErrBadRequest
    - ErrConflict
  response.BaseResponse:
    properties:
      data: {}
      error: {}
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /api/v1/webhook/telegram:
    post:
      consumes:
      - application/json
      description: Handle incoming updates from Telegram via webhook
      parameters:
      - description: Telegram Update
        in: body
        name: update
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Telegram Webhook
      tags:
      - Telegram
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validates initData and returns JWT
      parameters:
      - description: initData
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                error:
                  $ref: '#/definitions/errorx.AppError'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                error:
                  $ref: '#/definitions/errorx.AppError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                error:
                  $ref: '#/definitions/errorx.AppError'
              type: object
      summary: Authenticate via Telegram
      tags:
      - Auth
